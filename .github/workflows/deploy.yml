name: Deploy Vue to GitHub Pages

# 触发条件：推送到 master 分支，或手动触发
on:
  push:
    branches: [ master ]
  workflow_dispatch:

# 任务配置
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 进入前端目录并安装依赖
      - name: Install dependencies
        run: |
          cd frontend-vue3
          npm run build

      # 4. 打包 Vue 项目
      - name: Build Vue project
        run: |
          cd frontend-vue3
          npm run build

      # 5. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend-vue3/dist # 打包后的 dist 文件夹
          branch: gh-pages # 部署到 gh-pages 分支（自动创建）